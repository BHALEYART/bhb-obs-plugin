<!DOCTYPE html>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BHB Live — OBS Capture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    #liveCanvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }
    /* Tiny status overlay — bottom-right, click-through, hidden in pure live mode */
    #statusOverlay {
      position: fixed;
      bottom: 8px; right: 10px;
      font-family: monospace;
      font-size: 10px;
      color: rgba(255,255,0,0.55);
      pointer-events: none;
      z-index: 9;
      line-height: 1.5;
      text-align: right;
    }
    #statusOverlay.hidden { display: none; }

    /* Resize handle strip — bottom edge, drag to resize */
    #resizeHandle {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 6px;
      cursor: ns-resize;
      z-index: 99;
      -webkit-app-region: no-drag;
    }
    /* Drag region for moving the frameless window */
    #dragBar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      -webkit-app-region: drag;
      z-index: 99;
    }
  </style>
</head>

// Subset image lazy cache
const IMG_SUBSET = {};
function getSubsetImg(relPath) {
  if (IMG_SUBSET[relPath]) return IMG_SUBSET[relPath];
  const img = new Image();
  img.src = `${ASSET_BASE}${relPath}`;
  IMG_SUBSET[relPath] = img;
  return img;
}

// Preload all subset images eagerly
function preloadSubsets() {
  Object.values(SUBSET_EYES).forEach(map => Object.values(map).forEach(p => getSubsetImg(p)));
}

  indices:       {},
  female:        false,
  bgMode:        'green',  // 'none'|'green'|'blue'|'scene'|'character'
  bgColor:       null,     // for custom solid color fills
  bgSceneIdx:    -1,
  lipSync:       true,
  lipSyncStyle:  'ehh',
  autoBlink:     true,
  blinkIntervalSec: 4,
  showStatus:    true,
};

});

// ── Expression & Blink State ─────────────────────────────────────────────────
let activeExpression = null;   // held eye expression (set by keybind)
let blinkActive      = false;  // true for ~120ms during blink
let blinkTimer       = null;

// Scene image cache
const SCENE_IMGS = {};

// ── Canvas ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('liveCanvas');
const ctx    = canvas.getContext('2d');

function fitCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
fitCanvas();
window.addEventListener('resize', () => { fitCanvas(); renderFrame(); });

// ── Mic / Audio Analysis ─────────────────────────────────────────────────────
let audioCtx  = null;
let analyser  = null;
let micStream = null;
let micActive = false;

async function startMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize        = 256;
    analyser.smoothingTimeConstant = 0.4;
    const source = audioCtx.createMediaStreamSource(micStream);
    source.connect(analyser);
    micActive = true;
    updateStatus();
  } catch(e) {
    console.warn('BHB Live: mic access denied —', e.message);
    micActive = false;
    updateStatus();
  }
}

function getMicVolume() {
  if (!analyser) return 0;
  const data = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
  return Math.sqrt(sum / data.length);
}

// ── Lip Sync ─────────────────────────────────────────────────────────────────
function mouthForLive(vol) {
  if (!liveState.lipSync) return null;
  const mid = liveState.lipSyncStyle === 'ooo' ? 'Ooo.png' : 'Ehh.png';
  if (vol > 0.12)  return 'Ahh.png';
  if (vol > 0.05)  return mid;
  if (vol > 0.018) return 'Eee.png';
  return 'Mmm.png';
}

// ── Blink Timer ───────────────────────────────────────────────────────────────
function scheduleBlink() {
  clearTimeout(blinkTimer);
  const base = (liveState.blinkIntervalSec || 4) * 1000;
  const jitter = (Math.random() - 0.5) * base * 0.6;
  blinkTimer = setTimeout(() => {
    if (liveState.autoBlink) {
      blinkActive = true;
      updateStatus();
      setTimeout(() => {
        blinkActive = false;
        updateStatus();
        scheduleBlink();
      }, 120);
    } else {
      scheduleBlink();
    }
  }, Math.max(500, base + jitter));
}

// ── Expression resolver ───────────────────────────────────────────────────────
function getEyeExpression() {
  if (blinkActive) return 'Blink.png';
  return activeExpression; // null = draw base eye trait normally
}

// ── Render ───────────────────────────────────────────────────────────────────
let lastVol = 0;
const BG_COLORS = { green: '#00ff00', blue: '#0000ff' };

function renderFrame() {
  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background
  const mode = liveState.bgMode;
  if (mode === 'green' || mode === 'blue') {
    ctx.fillStyle = BG_COLORS[mode] || '#00ff00';
    ctx.fillRect(0, 0, W, H);
  } else if (mode === 'solid' && liveState.bgColor) {
    ctx.fillStyle = liveState.bgColor;
    ctx.fillRect(0, 0, W, H);
  } else if (mode === 'scene') {
    const si = liveState.bgSceneIdx;
    const simg = si >= 0 ? SCENE_IMGS[si] : null;
    if (simg && simg.complete && simg.naturalWidth) {
      ctx.drawImage(simg, 0, 0, W, H);
    } else {
      ctx.fillStyle = '#222';
      ctx.fillRect(0, 0, W, H);
    }
  }
  // 'none' = transparent (no fill)
  // 'character' uses the BACKGROUNDS layer below

  // Get current mic volume
  const vol = micActive ? getMicVolume() : 0;
  lastVol = vol;

  // Resolve mouth + eyes
  const mouthOverride = mouthForLive(vol);
  const eyeExpr      = getEyeExpression();

  // Character layers
  const idx    = liveState.indices;
  const female = liveState.female;
  const baseEyeFile = TRAITS.EYES.files[idx['EYES'] ?? 0];

  // Compute draw rect — letterbox character into canvas
  const charSize = Math.min(W, H);
  const dx = (W - charSize) / 2;
  const dy = (H - charSize) / 2;

  for (const cat of LAYER_ORDER) {
    // Female-only layers
    if (FEMALE_LAYERS[cat] && !female) continue;

    // Skip character BG layer if not in character BG mode
    if (cat === 'BACKGROUNDS' && mode !== 'character') continue;

    let imgIdx = idx[cat] ?? 0;

    if (cat === 'MOUTH' && mouthOverride) {
      const mi = TRAITS.MOUTH.files.indexOf(mouthOverride);
      if (mi >= 0) imgIdx = mi;
    }

    if (cat === 'EYES') {
      // Expression / subset override
      if (eyeExpr) {
        const subsetMap = SUBSET_EYES[baseEyeFile];
        if (subsetMap && subsetMap[eyeExpr]) {
          const simg = getSubsetImg(subsetMap[eyeExpr]);
          if (simg.complete && simg.naturalWidth) {
            ctx.drawImage(simg, dx, dy, charSize, charSize);
            continue; // only skip base draw if subset image actually loaded
          }
          // subset image not loaded yet or missing — fall through to base eye draw
        } else {
          // No subset entry (e.g. Stare, or eye type with no map) — try as direct EYES trait
          const exprIdx = TRAITS.EYES.files.indexOf(eyeExpr);
          if (exprIdx >= 0) imgIdx = exprIdx;
        }
      }
    }

    const layerSrc = FEMALE_LAYERS[cat]
      ? IMG[cat]?.[0]
      : IMG[cat]?.[imgIdx];
    if (layerSrc && layerSrc.complete && layerSrc.naturalWidth) {
      ctx.drawImage(layerSrc, dx, dy, charSize, charSize);
    }
  }
}

// ── Asset preload ─────────────────────────────────────────────────────────────
async function preloadAll() {
  const allPaths = [];
  Object.entries(TRAITS).forEach(([cat, td]) => {
    td.files.forEach((file, i) => {
      allPaths.push({ cat, i, url: `${ASSET_BASE}${cat}/${encodeURIComponent(file)}` });
    });
  });
  Object.entries(FEMALE_LAYERS).forEach(([cat, ld]) => {
    ld.files.forEach((file, i) => {
      allPaths.push({ cat, i, url: `${ASSET_BASE}${ld.folder}/${encodeURIComponent(file)}` });
    });
  });

  let loaded = 0;
  await Promise.all(allPaths.map(({ cat, i, url }) => new Promise(res => {
    const img = new Image();
    img.onload = img.onerror = () => { loaded++; res(); };
    img.src = url;
    IMG[cat][i] = img;
  })));

  preloadSubsets();
  renderFrame();
  startMic();
  scheduleBlink();
}

// ── Scene loader ──────────────────────────────────────────────────────────────
function loadScene(idx) {
  if (SCENE_IMGS[idx] && SCENE_IMGS[idx].complete) return;
  const img = new Image();
  img.onload = () => { SCENE_IMGS[idx] = img; renderFrame(); };
  img.onerror = () => {};
  img.src = `${SCENES_BASE}/bg${idx + 1}.png`;
  SCENE_IMGS[idx] = img;
}

// ── IPC: State & Expression ───────────────────────────────────────────────────
if (window.electronAPI) {
  window.electronAPI.onStateUpdate(state => {
    const prevBg    = liveState.bgMode;
    const prevScene = liveState.bgSceneIdx;

    // Merge incoming state
    Object.assign(liveState, state);

    // Blink interval changed → reschedule
    if (state.blinkIntervalSec !== undefined || state.autoBlink !== undefined) {
      clearTimeout(blinkTimer);
      scheduleBlink();
    }

    // Scene changed → preload
    if (liveState.bgMode === 'scene' && liveState.bgSceneIdx >= 0) {
      loadScene(liveState.bgSceneIdx);
    }

    // Status overlay visibility
    const so = document.getElementById('statusOverlay');
    if (so) so.classList.toggle('hidden', !liveState.showStatus);

    renderFrame();
    updateStatus();
  });

  window.electronAPI.onExpressionActivate(expr => {
    if (expr === '__CLEAR__') {
      activeExpression = null;
    } else {
      activeExpression = (activeExpression === expr) ? null : expr; // toggle: same key clears
    }
    updateStatus();
    renderFrame();
  });
}

// ── Status overlay ────────────────────────────────────────────────────────────
function updateStatus() {
  document.getElementById('statusExpr').textContent  = `EXPR: ${activeExpression || '—'}`;
  document.getElementById('statusMic').textContent   = `MIC: ${micActive ? 'ON' : 'OFF'}`;
  document.getElementById('statusBlink').textContent = `BLINK: ${liveState.autoBlink ? `${liveState.blinkIntervalSec}s` : 'OFF'}`;
}

// ── Render loop (60fps) ───────────────────────────────────────────────────────
function loop() {
  renderFrame();
  requestAnimationFrame(loop);
}

// ── Boot ─────────────────────────────────────────────────────────────────────
preloadAll().then(() => {
  loop();
});
</script>
</body>
</html>
